<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tresor</title>
<style>
/* ============================ Grundlagen ============================ */
:root{
  --bg-0:#0a0c12; --bg-1:#0f131c; --bg-2:#151b27; --bg-3:#1b2332;
  --line:#232c3d; --line-soft:#1a2130;
  --tx-hi:#eef2f8; --tx:#aeb9cd; --tx-dim:#66738b;
  --accent:#5b8cff; --accent-2:#2ee6a6; --gold:#e7b24a;
  --danger:#ff5c72; --warn:#ffb454;
  --shadow:0 18px 50px -12px rgba(0,0,0,.65);
  --radius:16px;
}
*{box-sizing:border-box; margin:0; padding:0}
html,body{height:100%}
body{
  font-family:"Segoe UI Variable","Segoe UI",system-ui,-apple-system,sans-serif;
  background:var(--bg-0); color:var(--tx-hi);
  -webkit-font-smoothing:antialiased; overflow:hidden;
  user-select:none;
}
body::before{
  content:""; position:fixed; inset:0; z-index:0; pointer-events:none;
  background:
    radial-gradient(900px 600px at 12% -8%, rgba(91,140,255,.16), transparent 60%),
    radial-gradient(800px 700px at 108% 12%, rgba(46,230,166,.10), transparent 55%),
    radial-gradient(700px 700px at 60% 120%, rgba(231,178,74,.06), transparent 60%);
}
button{font-family:inherit; cursor:pointer; border:none; background:none; color:inherit}
input,textarea,select{font-family:inherit; font-size:14px}
::selection{background:rgba(91,140,255,.35)}
.mono{font-family:"Cascadia Code",ui-monospace,Consolas,monospace}
.hidden{display:none !important}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#232c3d;border-radius:20px;border:2px solid var(--bg-1)}
::-webkit-scrollbar-thumb:hover{background:#2f3a4f}

/* ============================ Sprach-Umschalter =================== */
#langToggle{position:fixed;top:13px;right:16px;z-index:100;display:flex;gap:3px;
  background:rgba(15,19,28,.72);border:1px solid var(--line);border-radius:20px;padding:3px;backdrop-filter:blur(6px)}
#langToggle button{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--tx-dim);
  padding:4px 10px;border-radius:16px;transition:.12s}
#langToggle button:hover{color:var(--tx-hi)}
#langToggle button.on{background:var(--accent);color:#08131f}

/* ============================ Zentrierte Screens (Lock / Setup) ==== */
.center-screen{
  position:relative; z-index:1; height:100vh; display:flex;
  align-items:center; justify-content:center; padding:24px;
}
.gate{
  width:100%; max-width:420px; background:linear-gradient(180deg,var(--bg-2),var(--bg-1));
  border:1px solid var(--line); border-radius:22px; box-shadow:var(--shadow);
  padding:38px 34px; text-align:center; animation:rise .5s cubic-bezier(.2,.8,.2,1);
}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.brand-lock{
  width:72px;height:72px;margin:0 auto 18px; border-radius:20px;
  display:grid;place-items:center;
  background:radial-gradient(120% 120% at 30% 20%,#22304e,#131a29);
  border:1px solid #2c3a56; box-shadow:inset 0 1px 0 rgba(255,255,255,.06), 0 10px 30px -10px rgba(91,140,255,.5);
}
.brand-lock svg{width:34px;height:34px;color:var(--accent)}
.gate h1{font-size:23px;letter-spacing:.3px;margin-bottom:4px}
.gate .sub{color:var(--tx-dim);font-size:13.5px;margin-bottom:26px;line-height:1.5}
.field-lab{display:block;text-align:left;font-size:12px;color:var(--tx-dim);margin:0 2px 6px;font-weight:600;letter-spacing:.3px}
.gate .inp-wrap{margin-bottom:16px}
.inp{
  width:100%; background:var(--bg-0); border:1px solid var(--line);
  color:var(--tx-hi); border-radius:12px; padding:13px 14px; font-size:15px;
  transition:border-color .15s, box-shadow .15s; user-select:text;
}
.inp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,140,255,.16)}
.inp.pin{letter-spacing:8px;text-align:center;font-size:20px}
.btn-primary{
  width:100%; margin-top:6px; padding:14px; border-radius:12px; font-size:15px; font-weight:650;
  color:#08131f; background:linear-gradient(180deg,#6f9bff,#4d7cff);
  box-shadow:0 10px 24px -8px rgba(91,140,255,.6); transition:transform .12s, filter .15s;
}
.btn-primary:hover{filter:brightness(1.06)}
.btn-primary:active{transform:translateY(1px)}
.btn-primary:disabled{opacity:.5;cursor:default;filter:none;box-shadow:none}
.gate-msg{min-height:18px;margin-top:14px;font-size:13px;color:var(--danger)}
.gate-hint{margin-top:18px;font-size:12px;color:var(--tx-dim);line-height:1.55}
.strength{height:6px;border-radius:6px;background:var(--bg-0);overflow:hidden;margin:2px 2px 0}
.strength>i{display:block;height:100%;width:0;transition:width .25s, background .25s}

/* ============================ App-Layout ========================== */
#screen-app{position:relative;z-index:1;height:100vh;display:grid;grid-template-columns:270px 1fr}

/* -------- Sidebar -------- */
#sidebar{
  background:linear-gradient(180deg,var(--bg-1),#0c1017);
  border-right:1px solid var(--line-soft); display:flex; flex-direction:column;
  padding:18px 14px; gap:14px; min-height:0;
}
.side-brand{display:flex;align-items:center;gap:11px;padding:4px 6px 2px}
.side-brand .mk{
  width:38px;height:38px;border-radius:11px;display:grid;place-items:center;
  background:radial-gradient(120% 120% at 30% 20%,#22304e,#131a29);border:1px solid #2c3a56;
}
.side-brand .mk svg{width:19px;height:19px;color:var(--accent)}
.side-brand b{font-size:16.5px;letter-spacing:.4px}
.side-brand span{display:block;font-size:11px;color:var(--tx-dim);margin-top:-2px}
.search{position:relative}
.search svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--tx-dim)}
.search input{
  width:100%;background:var(--bg-0);border:1px solid var(--line);border-radius:11px;
  color:var(--tx-hi);padding:10px 12px 10px 34px;font-size:13.5px;user-select:text;
}
.search input:focus{outline:none;border-color:var(--accent)}
.nav{flex:1;overflow-y:auto;min-height:0;display:flex;flex-direction:column;gap:3px;padding-right:2px}
.nav-lab{font-size:10.5px;font-weight:700;letter-spacing:1.2px;color:var(--tx-dim);margin:12px 8px 4px;text-transform:uppercase}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:10px;
  color:var(--tx);font-size:13.5px;transition:background .13s,color .13s;position:relative;
}
.nav-item .ico{width:22px;text-align:center;font-size:14px;flex:none}
.nav-item .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.nav-item .ct{font-size:11px;color:var(--tx-dim);background:var(--bg-2);padding:1px 8px;border-radius:20px}
.nav-item:hover{background:var(--bg-2);color:var(--tx-hi)}
.nav-item.active{background:linear-gradient(90deg,rgba(91,140,255,.18),rgba(91,140,255,.06));color:#fff}
.nav-item.active::before{content:"";position:absolute;left:0;top:8px;bottom:8px;width:3px;border-radius:3px;background:var(--accent)}
.side-foot{display:flex;gap:8px;border-top:1px solid var(--line-soft);padding-top:12px}
.side-btn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:10px;
  border-radius:11px;background:var(--bg-2);border:1px solid var(--line);color:var(--tx);
  font-size:12.5px;font-weight:600;transition:.13s;
}
.side-btn:hover{background:var(--bg-3);color:var(--tx-hi)}
.side-btn svg{width:15px;height:15px}
.side-btn.lock:hover{color:var(--gold);border-color:#4a3d1f}

/* -------- Main -------- */
#main{display:flex;flex-direction:column;min-width:0;min-height:0}
.topbar{
  display:flex;align-items:center;gap:16px;padding:20px 96px 16px 26px;
}
.topbar .tt{flex:1;min-width:0}
.topbar h2{font-size:20px;letter-spacing:.2px;display:flex;align-items:center;gap:10px}
.topbar .cnt{font-size:12.5px;color:var(--tx-dim);margin-top:3px}
.btn-add{
  display:flex;align-items:center;gap:8px;padding:11px 18px;border-radius:12px;font-weight:650;font-size:14px;
  color:#08131f;background:linear-gradient(180deg,#41ecb0,#2ee6a6);
  box-shadow:0 10px 24px -10px rgba(46,230,166,.6);transition:transform .12s,filter .15s;
}
.btn-add:hover{filter:brightness(1.05)}
.btn-add:active{transform:translateY(1px)}
.btn-add svg{width:17px;height:17px}
.cards{
  flex:1;overflow-y:auto;min-height:0;padding:6px 26px 30px;
  display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:14px;align-content:start;
}
.card{
  background:linear-gradient(180deg,var(--bg-2),var(--bg-1));border:1px solid var(--line);
  border-radius:15px;padding:16px;transition:transform .14s,border-color .14s,box-shadow .14s;
  cursor:pointer;position:relative;overflow:hidden;
}
.card:hover{transform:translateY(-3px);border-color:#31415d;box-shadow:0 16px 34px -18px rgba(0,0,0,.8)}
.card .row1{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.badge{
  width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;flex:none;
  background:var(--bg-3);border:1px solid var(--line);
}
.card .ti{flex:1;min-width:0}
.card .ti b{font-size:15px;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.card .ti .grp{font-size:11.5px;color:var(--tx-dim);margin-top:2px;display:flex;align-items:center;gap:5px}
.card .ident{
  font-size:12.5px;color:var(--tx);background:var(--bg-0);border:1px solid var(--line-soft);
  border-radius:9px;padding:8px 10px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  display:flex;align-items:center;gap:8px;margin-bottom:9px;
}
.card .ident .k{color:var(--tx-dim);font-size:10.5px;text-transform:uppercase;letter-spacing:.4px;flex:none}
.card .ident .v{flex:1;overflow:hidden;text-overflow:ellipsis}
.quick{display:flex;gap:8px}
.qbtn{
  flex:1;display:flex;align-items:center;justify-content:center;gap:7px;padding:9px;border-radius:10px;
  background:var(--bg-3);border:1px solid var(--line);color:var(--tx);font-size:12.5px;font-weight:600;transition:.13s;
}
.qbtn:hover{background:#232e42;color:var(--tx-hi);border-color:#33425e}
.qbtn.pw:hover{color:var(--accent-2);border-color:#1f5545}
.qbtn svg{width:14px;height:14px}
.qbtn.done{color:var(--accent-2);border-color:#1f5545;background:rgba(46,230,166,.08)}

.empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--tx-dim)}
.empty .big{width:88px;height:88px;margin:0 auto 20px;border-radius:26px;display:grid;place-items:center;
  background:radial-gradient(120% 120% at 30% 20%,#1a2233,#0f131c);border:1px solid var(--line)}
.empty .big svg{width:40px;height:40px;color:#38455f}
.empty h3{color:var(--tx-hi);font-size:18px;margin-bottom:8px}
.empty p{font-size:13.5px;line-height:1.6;max-width:340px;margin:0 auto 22px}

/* ============================ Drawer (Detailansicht) ============== */
.overlay{position:fixed;inset:0;z-index:40;background:rgba(6,8,12,.62);backdrop-filter:blur(3px);
  opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.show{opacity:1;pointer-events:auto}
#drawer{
  position:fixed;top:0;right:0;bottom:0;z-index:50;width:min(480px,94vw);
  background:linear-gradient(180deg,var(--bg-2),var(--bg-1));border-left:1px solid var(--line);
  box-shadow:-24px 0 60px -20px rgba(0,0,0,.7);transform:translateX(102%);
  transition:transform .28s cubic-bezier(.2,.8,.2,1);display:flex;flex-direction:column;
}
#drawer.show{transform:none}
.dw-head{display:flex;align-items:center;gap:14px;padding:22px 22px 18px;border-bottom:1px solid var(--line-soft)}
.dw-head .badge{width:50px;height:50px;font-size:24px}
.dw-head .ti{flex:1;min-width:0}
.dw-head h3{font-size:18px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.dw-head .grp{font-size:12px;color:var(--tx-dim);margin-top:3px}
.icon-btn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--tx-dim);
  border:1px solid transparent;transition:.13s;flex:none}
.icon-btn:hover{background:var(--bg-3);color:var(--tx-hi)}
.icon-btn svg{width:18px;height:18px}
.dw-body{flex:1;overflow-y:auto;padding:18px 22px;display:flex;flex-direction:column;gap:12px}
.frow{background:var(--bg-0);border:1px solid var(--line-soft);border-radius:13px;padding:12px 14px}
.frow .fk{font-size:11px;color:var(--tx-dim);font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.frow .fv-line{display:flex;align-items:center;gap:8px}
.frow .fv{flex:1;font-size:14.5px;word-break:break-all;line-height:1.4;user-select:text}
.frow .fv.secret{letter-spacing:2px;color:var(--tx)}
.frow .fv.multiline{white-space:pre-wrap;max-height:150px;overflow:auto}
.mini{width:32px;height:32px;border-radius:9px;display:grid;place-items:center;flex:none;
  background:var(--bg-2);border:1px solid var(--line);color:var(--tx-dim);transition:.12s}
.mini:hover{background:var(--bg-3);color:var(--tx-hi)}
.mini.ok{color:var(--accent-2);border-color:#1f5545}
.mini svg{width:15px;height:15px}
.dw-foot{display:flex;gap:10px;padding:16px 22px;border-top:1px solid var(--line-soft)}
.btn-line{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:12px;border-radius:12px;
  background:var(--bg-3);border:1px solid var(--line);color:var(--tx-hi);font-weight:600;font-size:13.5px;transition:.13s}
.btn-line:hover{background:#232e42}
.btn-line svg{width:16px;height:16px}
.btn-line.danger{color:var(--danger)}
.btn-line.danger:hover{background:rgba(255,92,114,.1);border-color:#5c2731}

/* ============================ Modal (Anlegen / Bearbeiten) ======== */
#modal,#settings{position:fixed;inset:0;z-index:60;display:flex;align-items:center;justify-content:center;padding:22px;
  opacity:0;pointer-events:none;transition:opacity .2s}
#modal.show,#settings.show{opacity:1;pointer-events:auto}
.sheet{width:100%;max-width:560px;max-height:92vh;background:linear-gradient(180deg,var(--bg-2),var(--bg-1));
  border:1px solid var(--line);border-radius:20px;box-shadow:var(--shadow);display:flex;flex-direction:column;
  transform:translateY(14px) scale(.98);transition:transform .22s}
#modal.show .sheet,#settings.show .sheet{transform:none}
.sh-head{display:flex;align-items:center;gap:12px;padding:20px 22px;border-bottom:1px solid var(--line-soft)}
.sh-head h3{flex:1;font-size:17px}
.sh-body{flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:16px}
.type-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.type-card{display:flex;flex-direction:column;align-items:center;gap:8px;padding:16px 8px;border-radius:14px;
  background:var(--bg-0);border:1px solid var(--line);transition:.14s;text-align:center}
.type-card:hover{border-color:var(--accent);transform:translateY(-2px);background:var(--bg-2)}
.type-card .em{font-size:26px}
.type-card .lb{font-size:11.5px;color:var(--tx);line-height:1.3}
.form-lab{font-size:12px;color:var(--tx-dim);font-weight:600;letter-spacing:.3px;margin:0 2px 7px;display:block}
.finp{width:100%;background:var(--bg-0);border:1px solid var(--line);color:var(--tx-hi);border-radius:11px;
  padding:11px 13px;font-size:14px;user-select:text;transition:border-color .13s}
.finp:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(91,140,255,.14)}
.edit-field{background:var(--bg-0);border:1px solid var(--line-soft);border-radius:13px;padding:11px 12px}
.ef-top{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.ef-key{flex:1;background:transparent;border:none;color:var(--tx);font-size:12px;font-weight:700;
  letter-spacing:.4px;text-transform:uppercase;user-select:text}
.ef-key:focus{outline:none;color:var(--tx-hi)}
.ef-tools{display:flex;align-items:center;gap:4px}
.chip-tog{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--tx-dim);padding:3px 8px;border-radius:20px;
  border:1px solid var(--line);transition:.12s}
.chip-tog.on{color:var(--accent-2);border-color:#1f5545;background:rgba(46,230,166,.08)}
.chip-tog svg{width:12px;height:12px}
.ef-val-line{display:flex;align-items:center;gap:7px}
.ef-val{flex:1;background:transparent;border:none;color:var(--tx-hi);font-size:14px;padding:2px 0;user-select:text;resize:none}
.ef-val:focus{outline:none}
.ef-x{color:var(--tx-dim);width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:none}
.ef-x:hover{color:var(--danger);background:rgba(255,92,114,.08)}
.ef-x svg{width:14px;height:14px}
.add-field{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border-radius:12px;
  border:1px dashed var(--line);color:var(--tx-dim);font-size:13px;font-weight:600;transition:.13s}
.add-field:hover{border-color:var(--accent);color:var(--accent)}
.sh-foot{display:flex;gap:10px;padding:16px 22px;border-top:1px solid var(--line-soft)}
.sh-foot .btn-line{flex:0 0 auto;padding-left:22px;padding-right:22px}
.sh-foot .spring{flex:1}
.btn-save{padding:12px 26px;border-radius:12px;font-weight:650;font-size:14px;color:#08131f;
  background:linear-gradient(180deg,#6f9bff,#4d7cff);box-shadow:0 10px 22px -10px rgba(91,140,255,.6);transition:.13s}
.btn-save:hover{filter:brightness(1.06)}
.btn-save:disabled{opacity:.5;cursor:default}

/* Passwort-Generator Popover */
.gen-tool{margin-top:9px;background:var(--bg-2);border:1px solid var(--line);border-radius:12px;padding:12px}
.gen-out{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.gen-out .val{flex:1;font-size:14px;background:var(--bg-0);border:1px solid var(--line);border-radius:9px;padding:9px 11px;overflow:hidden;text-overflow:ellipsis}
.gen-row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--tx)}
.gen-row label{display:flex;align-items:center;gap:6px;cursor:pointer}
.gen-row input[type=range]{accent-color:var(--accent)}
.gen-row input[type=checkbox]{accent-color:var(--accent-2);width:15px;height:15px}
.gen-apply{padding:7px 14px;border-radius:9px;background:var(--accent);color:#08131f;font-weight:650;font-size:12.5px}

/* ============================ Toast =============================== */
#toast-wrap{position:fixed;left:50%;bottom:26px;transform:translateX(-50%);z-index:90;display:flex;flex-direction:column;gap:8px;align-items:center}
.toast{display:flex;align-items:center;gap:10px;background:#0e1420;border:1px solid var(--line);
  border-radius:12px;padding:11px 16px;font-size:13px;color:var(--tx-hi);box-shadow:var(--shadow);
  animation:toastin .28s cubic-bezier(.2,.8,.2,1)}
.toast .dot{width:24px;height:24px;border-radius:8px;display:grid;place-items:center;background:rgba(46,230,166,.14);color:var(--accent-2);flex:none}
.toast .dot svg{width:14px;height:14px}
.toast.warn .dot{background:rgba(255,180,84,.14);color:var(--warn)}
.toast small{color:var(--tx-dim);display:block;font-size:11px;margin-top:1px}
@keyframes toastin{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes toastout{to{opacity:0;transform:translateY(8px)}}
.toast.out{animation:toastout .2s forwards}
</style>
</head>
<body>

<div id="langToggle">
  <button data-lang="de">DE</button>
  <button data-lang="en">EN</button>
</div>

<!-- ===================== LOCK ===================== -->
<div id="screen-lock" class="center-screen hidden">
  <div class="gate">
    <div class="brand-lock" id="lockGlyph"></div>
    <h1>Tresor</h1>
    <div class="sub" data-i18n-html="lock.sub"></div>
    <div class="inp-wrap">
      <label class="field-lab" data-i18n="lock.master"></label>
      <input id="lkPass" class="inp" type="password" autocomplete="off" data-i18n-ph="lock.masterPh">
    </div>
    <div class="inp-wrap">
      <label class="field-lab" data-i18n="lock.pin"></label>
      <input id="lkPin" class="inp pin" type="password" inputmode="numeric" autocomplete="off" placeholder="••••">
    </div>
    <button id="lkBtn" class="btn-primary" data-i18n="lock.unlock"></button>
    <div id="lkMsg" class="gate-msg"></div>
    <button class="gate-hint" id="lkForgot" data-i18n="lock.forgot" style="background:none;border:none;cursor:pointer;text-decoration:underline"></button>
  </div>
</div>

<!-- ===================== SETUP (Erststart) ===================== -->
<div id="screen-setup" class="center-screen hidden">
  <div class="gate">
    <div class="brand-lock" id="setupGlyph"></div>
    <h1 data-i18n="setup.welcome"></h1>
    <div class="sub" data-i18n-html="setup.sub"></div>
    <div class="inp-wrap">
      <label class="field-lab" data-i18n="setup.chooseMaster"></label>
      <input id="stPass" class="inp" type="password" autocomplete="off" data-i18n-ph="setup.min8">
      <div class="strength"><i id="stBar"></i></div>
    </div>
    <div class="inp-wrap">
      <label class="field-lab" data-i18n="setup.repeat"></label>
      <input id="stPass2" class="inp" type="password" autocomplete="off" data-i18n-ph="setup.repeatPh">

    <button id="stBtn" class="btn-primary" data-i18n="setup.create"></button>
    <div id="stMsg" class="gate-msg"></div>
    <div class="gate-hint" data-i18n="setup.hint"></div>
  </div>

<!-- ===================== NOTFALL-SCHLÜSSEL ===================== -->
<div id="screen-recovery" class="center-screen hidden">
  <div class="gate" style="max-width:460px">
    <div class="brand-lock" id="recGlyph" style="box-shadow:inset 0 1px 0 rgba(255,255,255,.06),0 10px 30px -10px rgba(231,178,74,.5)"></div>
    <h1 data-i18n="rec.title"></h1>
    <div class="sub" data-i18n-html="rec.sub"></div>
    <div style="background:var(--bg-0);border:1px solid #4a3d1f;border-radius:13px;padding:16px;margin-bottom:16px">
      <div class="mono" id="rvKey" style="font-size:16px;letter-spacing:1px;line-height:2;word-break:break-all;color:var(--gold);user-select:text;text-align:center"></div>
      <button class="btn-line" id="rvCopy" data-i18n="rec.copy" style="margin-top:12px;width:100%"></button>
    </div>
    <label style="display:flex;gap:11px;align-items:flex-start;text-align:left;font-size:13px;color:var(--tx);margin-bottom:16px;cursor:pointer">
      <input type="checkbox" id="rvChk" style="margin-top:2px;width:17px;height:17px;accent-color:var(--accent-2);flex:none">
      <span data-i18n="rec.confirm"></span>
    </label>
    <button id="rvBtn" class="btn-primary" data-i18n="rec.done" disabled></button>
  </div>
</div>

<!-- ===================== PASSWORT VERGESSEN ===================== -->
<div id="screen-forgot" class="center-screen hidden">
  <div class="gate" style="max-width:460px">
    <div class="brand-lock" id="fgGlyph"></div>
    <h1 data-i18n="fg.title"></h1>
    <div class="sub" data-i18n-html="fg.sub"></div>
    <div class="inp-wrap">
      <label class="field-lab" data-i18n="fg.key"></label>
      <textarea id="fgKey" class="inp mono" rows="2" autocomplete="off" placeholder="XXXXX-XXXXX-XXXXX ..." style="resize:none;letter-spacing:1px"></textarea>

      <label class="field-lab" data-i18n="fg.newMaster"></label>
      <input id="fgPass" class="inp" type="password" autocomplete="off" data-i18n-ph="setup.min8">

    <div class="inp-wrap">
      <label class="field-lab" data-i18n="fg.newPin"></label>
      <input id="fgPin" class="inp pin" type="password" inputmode="numeric" autocomplete="off" placeholder="••••">

    <button id="fgBtn" class="btn-primary" data-i18n="fg.submit"></button>
    <div id="fgMsg" class="gate-msg"></div>
    <button class="gate-hint" id="fgBack" data-i18n="fg.back" style="background:none;border:none;cursor:pointer;text-decoration:underline"></button>

</div>

/* ================================================================
   Diagnose + sicherer Einstellungs-Speicher
   ================================================================ */
window.__diag=[];
window.addEventListener('error',e=>{try{window.__diag.push('ERR: '+(e.message||e.error)+' @'+(e.filename||'').split('/').pop()+':'+e.lineno);}catch(_){}});
window.addEventListener('unhandledrejection',e=>{try{window.__diag.push('REJ: '+(e.reason&&e.reason.message?e.reason.message:String(e.reason)));}catch(_){}});

const store={_m:{},
  get(k){try{return localStorage.getItem(k);}catch(e){return (k in this._m)?this._m[k]:null;}},
  set(k,v){try{localStorage.setItem(k,v);}catch(e){this._m[k]=String(v);}},
  del(k){try{localStorage.removeItem(k);}catch(e){delete this._m[k];}}
};

/* ================================================================
   API-Anbindung: echt (pywebview) oder Test-Mock (Browser-Vorschau)
   ================================================================ */
const MockAPI = (()=>{
  const KEY='tresor_mock';
  function load(){try{return JSON.parse(store.get(KEY))||null}catch(e){return null}}
  function save(d){store.set(KEY,JSON.stringify(d))}
  let creds=null, data=load();
  return {
    get_state:()=>Promise.resolve({vault_exists:!!data}),
    create_vault:(m,p)=>{data={entries:[]};creds={m,p};save(data);
      const rk=Array.from({length:11},()=>Math.random().toString(36).slice(2,7).toUpperCase()).join('-');
      return Promise.resolve({ok:true,recovery:rk})},
    unlock:(m,p)=>{if(!data)return Promise.resolve({ok:false,error:'unknown'});creds={m,p};return Promise.resolve({ok:true,entries:data.entries})},
    unlock_recovery:(rk)=>{if(!data)return Promise.resolve({ok:false,error:'unknown'});return Promise.resolve({ok:true,entries:data.entries})},
    change_master:(m,p)=>{creds={m,p};return Promise.resolve({ok:true})},
    lock:()=>{creds=null;return Promise.resolve({ok:true})},
    save_entry:(e)=>{if(!e.id){e.id='id'+Math.random().toString(36).slice(2)}
      const i=data.entries.findIndex(x=>x.id===e.id);if(i>=0)data.entries[i]=e;else data.entries.push(e);save(data);return Promise.resolve({ok:true,entry:e})},
    delete_entry:(id)=>{data.entries=data.entries.filter(x=>x.id!==id);save(data);return Promise.resolve({ok:true})},
    copy_secret:(t,clr)=>{try{navigator.clipboard.writeText(t)}catch(e){}return Promise.resolve({ok:true,cleared_in:clr})},
    generate_password:(len,o)=>{let s='';const L='abcdefghijkmnpqrstuvwxyz',U='ABCDEFGHJKLMNPQRSTUVWXYZ',N='23456789',S='!@#$%&*?-_=+';
      let pool=(o.lower?L:'')+(o.upper?U:'')+(o.digits?N:'')+(o.symbols?S:'');if(!pool)pool=L+U+N;
      for(let i=0;i<len;i++)s+=pool[Math.floor(Math.random()*pool.length)];return Promise.resolve({password:s})},
    export_backup:()=>Promise.resolve({ok:true,path:'(preview)'}),
  };
})();

});

async function copyVal(text,btn){

    setTimeout(()=>{btn.classList.remove('ok','done');btn.innerHTML=old;},1100);}

function initGlyphs(){['lockGlyph','setupGlyph','sideGlyph','recGlyph','fgGlyph'].forEach(id=>{const e=$('#'+id);if(!e)return;e.innerHTML=svg('lock', id==='sideGlyph'?19:34);if(id==='recGlyph'){const s=e.querySelector('svg');if(s)s.style.color='var(--gold)';}});}
function scorePw(p){let s=0;if(p.length>=8)s++;if(p.length>=12)s++;if(/[a-z]/.test(p)&&/[A-Z]/.test(p))s++;if(/\d/.test(p))s++;if(/[^A-Za-z0-9]/.test(p))s++;return Math.min(s,4);}
function bindLock(){
  const go=async()=>{
    const p=$('#lkPass').value,pin=$('#lkPin').value;
    if(!p||!pin){$('#lkMsg').textContent=t('msg.enterBoth');return;}
    $('#lkBtn').disabled=true;$('#lkMsg').textContent='';
    const r=await call('unlock',p,pin);
    $('#lkBtn').disabled=false;
    if(r&&r.ok){S.entries=r.entries||[];$('#lkPass').value='';$('#lkPin').value='';openApp();}
    else{$('#lkMsg').textContent=errText(r);$('#lkPin').value='';$('#lkPin').focus();}
  };
  $('#lkBtn').onclick=go;
  ['lkPass','lkPin'].forEach(id=>$('#'+id).addEventListener('keydown',e=>{if(e.key==='Enter')go();}));
}
function bindSetup(){
  $('#stPass').addEventListener('input',e=>{
    const s=scorePw(e.target.value);const b=$('#stBar');
    const col=['#ff5c72','#ff5c72','#ffb454','#2ee6a6','#2ee6a6'][s];
    b.style.width=(s*25)+'%';b.style.background=col;
  });
  const go=async()=>{
    const p=$('#stPass').value,p2=$('#stPass2').value,pin=$('#stPin').value;
    const m=$('#stMsg');
    if(p.length<8){m.textContent=t('msg.min8');return;}
    if(p!==p2){m.textContent=t('msg.mismatch');return;}
    if(!/^\d{4,8}$/.test(pin)){m.textContent=t('msg.pinFmt');return;}
    $('#stBtn').disabled=true;m.textContent='';
    const r=await call('create_vault',p,pin);
    $('#stBtn').disabled=false;
    if(r&&r.ok){$('#stPass').value='';$('#stPass2').value='';$('#stPin').value='';showRecovery(r.recovery,p,pin);}
    else{m.textContent=errText(r);}
  };
  $('#stBtn').onclick=go;
  $('#stPin').addEventListener('keydown',e=>{if(e.key==='Enter')go();});
}
function showRecovery(key,pass,pin){
  show('screen-recovery');
  $('#rvKey').textContent=key||t('rec.none');
  $('#rvChk').checked=false;$('#rvBtn').disabled=true;
  $('#rvChk').onchange=e=>{$('#rvBtn').disabled=!e.target.checked;};
  $('#rvCopy').onclick=()=>{copyVal(key,null);};
  $('#rvBtn').onclick=async()=>{
    $('#rvBtn').disabled=true;
    const u=await call('unlock',pass,pin);
    S.entries=(u&&u.entries)||[];openApp();
  };
}
function bindForgot(){
  const go=async()=>{
    const key=$('#fgKey').value.trim(),p=$('#fgPass').value,pin=$('#fgPin').value,m=$('#fgMsg');
    if(!key){m.textContent=t('fg.enterKey');return;}
    if(p.length<8){m.textContent=t('msg.min8new');return;}
    if(!/^\d{4,8}$/.test(pin)){m.textContent=t('msg.pinFmtNew');return;}
    $('#fgBtn').disabled=true;m.textContent='';
    const r=await call('unlock_recovery',key);
    if(!(r&&r.ok)){$('#fgBtn').disabled=false;m.textContent=errText(r);return;}
    const c=await call('change_master',p,pin);
    $('#fgBtn').disabled=false;
    if(c&&c.ok){S.entries=r.entries||[];$('#fgKey').value='';$('#fgPass').value='';$('#fgPin').value='';openApp();toast(t('toast.newPwSet'));}
    else{m.textContent=errText(c);}
  };
  $('#fgBtn').onclick=go;
  $('#lkForgot').onclick=()=>{show('screen-forgot');setTimeout(()=>$('#fgKey').focus(),80);};
  $('#fgBack').onclick=()=>{show('screen-lock');setTimeout(()=>$('#lkPass').focus(),80);};
}

function visibleEntries(){
  let list=S.entries.slice();
  if(S.group!=='__all')list=list.filter(e=>(e.group||t('app.ungrouped'))===S.group);
  const q=S.query.trim().toLowerCase();
  if(q)list=list.filter(e=>{
    const hay=[e.title,e.group,typeLb(typeOf(e.type))].concat((e.fields||[]).map(f=>f.key+' '+(f.secret?'':f.value))).join(' ').toLowerCase();
    return hay.includes(q);
  });

}
function primaryIdent(e){const f=(e.fields||[]).find(x=>!x.secret&&x.value);return f?{k:f.key,v:f.value}:null;}
function primarySecret(e){return (e.fields||[]).find(x=>x.secret&&x.value)||null;}

function openDrawer(id){

  const add=el('button','add-field');add.innerHTML=svg('plus',16)+esc(t('md.addField'));
  add.onclick=()=>wrap.appendChild(fieldRow({key:t('md.newField'),value:'',secret:false},true));
  body.appendChild(add);
  $('#mdFoot').innerHTML='';
  const back=el('button','btn-line');back.style.flex='0 0 auto';back.textContent=existing?t('md.cancel'):t('md.back');
  back.onclick=()=>{ if(existing)closeModal(); else openEditor(); };
  const spring=el('div','spring');
  const saveB=el('button','btn-save');saveB.textContent=t('md.save');saveB.onclick=saveForm;
  $('#mdFoot').append(back,spring,saveB);
  setTimeout(()=>$('#fTitle').focus(),50);
}
function fieldRow(f,focus){
  const row=el('div','edit-field');row.dataset.field='1';
  row.innerHTML=
    '<div class="ef-top"><input class="ef-key" value="'+esc(f.key)+'">'+
      '<div class="ef-tools"><button class="chip-tog'+(f.secret?' on':'')+'" data-sec>'+svg('lock',12)+esc(t('md.secret'))+'</button>'+
      '<button class="ef-x" data-del><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div></div>'+
    '<div class="ef-val-line"><input class="ef-val" value="'+esc(f.value)+'" '+(f.secret?'type="password"':'')+' placeholder="'+esc(t('md.valuePh'))+'">'+
      '<button class="mini" data-gen title="'+esc(t('md.genTitle'))+'">'+svg('refresh',15)+'</button></div>';
  const secBtn=row.querySelector('[data-sec]');
  const val=row.querySelector('.ef-val');
  let secret=!!f.secret;
  const sync=()=>{secBtn.classList.toggle('on',secret);val.type=secret?'password':'text';row.dataset.secret=secret?'1':'';};
  sync();row.dataset.secret=secret?'1':'';
  secBtn.onclick=()=>{secret=!secret;sync();};
  row.querySelector('[data-del]').onclick=()=>row.remove();
  row.querySelector('[data-gen]').onclick=()=>openGen(row,val);
  if(focus)setTimeout(()=>row.querySelector('.ef-key').select(),30);
  return row;
}
function openGen(row,valInput){
  row.querySelectorAll('.gen-tool').forEach(x=>x.remove());
  const g=el('div','gen-tool');
  g.innerHTML=
    '<div class="gen-out"><span class="val mono" data-out>...</span><button class="mini" data-reroll>'+svg('refresh',15)+'</button></div>'+
    '<div class="gen-row"><label style="flex:1">'+esc(t('gen.length'))+' <b data-lenlab>20</b><br><input type="range" min="8" max="48" value="20" data-len style="width:100%"></label></div>'+
    '<div class="gen-row"><label><input type="checkbox" data-o="upper" checked>'+esc(t('gen.upper'))+'</label><label><input type="checkbox" data-o="lower" checked>'+esc(t('gen.lower'))+'</label>'+
      '<label><input type="checkbox" data-o="digits" checked>123</label><label><input type="checkbox" data-o="symbols" checked>!@#</label>'+
      '<div style="flex:1"></div><button class="gen-apply" data-apply>'+esc(t('gen.apply'))+'</button></div>';
  row.appendChild(g);
  const out=g.querySelector('[data-out]');
  const opts=()=>({upper:g.querySelector('[data-o=upper]').checked,lower:g.querySelector('[data-o=lower]').checked,digits:g.querySelector('[data-o=digits]').checked,symbols:g.querySelector('[data-o=symbols]').checked});
  const len=()=>+g.querySelector('[data-len]').value;
  const roll=async()=>{const r=await call('generate_password',len(),opts());out.textContent=r.password;};
  g.querySelector('[data-len]').oninput=e=>{g.querySelector('[data-lenlab]').textContent=e.target.value;roll();};
  g.querySelectorAll('[data-o]').forEach(c=>c.onchange=roll);
  g.querySelector('[data-reroll]').onclick=roll;
  g.querySelector('[data-apply]').onclick=()=>{valInput.value=out.textContent;valInput.dispatchEvent(new Event('input'));g.remove();};
  roll();
}
async function saveForm(){
  const e=S.editing;
  e.title=$('#fTitle').value.trim()||t('app.untitled');
  e.group=$('#fGroup').value.trim();
  const rows=[...$('#fieldWrap').querySelectorAll('[data-field]')];
  e.fields=rows.map(r=>({key:r.querySelector('.ef-key').value.trim()||t('md.field'),value:r.querySelector('.ef-val').value,secret:r.dataset.secret==='1'}));
  e.updated=Date.now();
  const r=await call('save_entry',e);
  if(r&&r.ok){
    const saved=r.entry||e;
    const i=S.entries.findIndex(x=>x.id===saved.id);
    if(i>=0)S.entries[i]=saved;else S.entries.push(saved);
    closeModal();renderApp();toast(t('toast.saved'));
  }else{toast(errText(r),null,true);}
}
function closeModal(){$('#modal').classList.remove('show');S.editing=null;}

/* ================================================================
   Sicherung / Sperren / Löschen
   ================================================================ */
async function delEntry(){
  const id=S.drawerId;if(!id)return;
  const e=S.entries.find(x=>x.id===id);
  if(!confirm(t('confirm.delete',(e?e.title:''))))return;
  const r=await call('delete_entry',id);
  if(r&&r.ok){S.entries=S.entries.filter(x=>x.id!==id);closeDrawer();renderApp();toast(t('toast.deleted'));}
}
async function lockNow(){
  await call('lock');S.entries=[];S.group='__all';S.query='';
  closeDrawer();closeModal();$('#searchBox').value='';
  show('screen-lock');$('#lkPass').focus();
}
async function doBackup(){
  const r=await call('export_backup');
  if(r&&r.ok)toast(t('toast.backupSaved'), r.path&&r.path[0]!=='('?r.path:t('toast.backupSub'));
  else if(r&&r.error)toast(errText(r),null,true);
}

/* ================================================================
   Einstellungen + Auto-Sperre
   ================================================================ */
let autolockMin = (function(){const v=parseInt(store.get('tresor_autolock'),10);return isNaN(v)?5:v;})();
let idleTimer=null, lastReset=0;
function resetIdle(){
  const now=performance.now();
  if(now-lastReset<800)return; lastReset=now;
  if(idleTimer)clearTimeout(idleTimer);
  if(!autolockMin)return;
  if($('#screen-app').classList.contains('hidden'))return;
  idleTimer=setTimeout(()=>{if(!$('#screen-app').classList.contains('hidden'))lockNow();},autolockMin*60000);
}
function openSettings(){
  $('#setAutolock').value=String(autolockMin);
  $('#setLangSel').value=LANG;
  $('#setPass').value='';$('#setPass2').value='';$('#setPin').value='';$('#setMsg').textContent='';
  $('#settings').classList.add('show');
}
function closeSettings(){$('#settings').classList.remove('show');}
function bindSettings(){
  $('#btnSettings').onclick=openSettings;
  $('#stClose').onclick=closeSettings;
  $('#setBackup').onclick=doBackup;
  $('#setLangSel').onchange=e=>{setLang(e.target.value);};
  $('#setAutolock').onchange=e=>{autolockMin=parseInt(e.target.value,10)||0;store.set('tresor_autolock',autolockMin);resetIdle();toast(autolockMin?t('toast.autolockSet',autolockMin):t('toast.autolockOff'));};
  $('#setChangeBtn').onclick=async()=>{
    const p=$('#setPass').value,p2=$('#setPass2').value,pin=$('#setPin').value,m=$('#setMsg');
    if(p.length<8){m.textContent=t('msg.min8short');return;}
    if(p!==p2){m.textContent=t('msg.mismatch2');return;}
    if(!/^\d{4,8}$/.test(pin)){m.textContent=t('msg.pinFmtShort');return;}
    $('#setChangeBtn').disabled=true;
    const r=await call('change_master',p,pin);
    $('#setChangeBtn').disabled=false;
    if(r&&r.ok){closeSettings();toast(t('toast.pwChanged'));}
    else{m.textContent=errText(r);}
  };
}
function bindLang(){
  document.querySelectorAll('#langToggle button').forEach(b=>{b.onclick=()=>setLang(b.dataset.lang);});
}

/* ================================================================
   Start
   ================================================================ */
function openApp(){show('screen-app');S.group='__all';S.query='';renderApp();resetIdle();}
function wire(){
  $('#btnAdd').onclick=()=>openEditor();
  $('#btnLock').onclick=lockNow;
  $('#btnBackup').onclick=doBackup;
  $('#searchBox').addEventListener('input',e=>{S.query=e.target.value;renderApp();});
  $('#dwClose').onclick=closeDrawer;$('#ovDrawer').onclick=closeDrawer;
  $('#dwEdit').onclick=()=>{const id=S.drawerId;closeDrawer();openEditor(id);};
  $('#dwDel').onclick=delEntry;
  $('#mdClose').onclick=closeModal;
  ['mousemove','keydown','click','scroll','touchstart'].forEach(ev=>document.addEventListener(ev,resetIdle,{passive:true}));
  document.addEventListener('keydown',e=>{if(e.key==='Escape'){if($('#settings').classList.contains('show'))closeSettings();else if($('#modal').classList.contains('show'))closeModal();else if($('#drawer').classList.contains('show'))closeDrawer();}});
}
async function boot(){
  try{initGlyphs();bindLock();bindSetup();bindForgot();bindSettings();bindLang();wire();applyStatic();}
  catch(e){window.__diag.push('BIND-THREW: '+(e&&e.message||e));}
  await apiReady;
  let st=null;
  try{st=await call('get_state');window.__diag.push('get_state ok: '+JSON.stringify(st));}
  catch(e){window.__diag.push('get_state THREW: '+(e&&e.message||e));}
  try{
    if(st&&st.vault_exists){show('screen-lock');setTimeout(()=>$('#lkPass').focus(),100);}
    else{show('screen-setup');setTimeout(()=>$('#stPass').focus(),100);}
  }catch(e){window.__diag.push('SHOW-THREW: '+(e&&e.message||e));}
}
boot();
</script>
